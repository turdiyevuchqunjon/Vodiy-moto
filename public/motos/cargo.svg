  <text x="80" y="120" fill="#F1F5F9" font-family="Arial,sans-serif" font-size="54" font-weight="700">CARGO SERIES</text>
  <text x="80" y="168" fill="#94A3B8" font-family="Arial,sans-serif" font-size="24">VodiyMoto yuk tashish yechimi</text>
</svg>
