<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" rx="32" fill="#0A0F1C"/>
  <circle cx="220" cy="170" r="150" fill="#F97316" fill-opacity="0.14"/>
  <circle cx="980" cy="160" r="180" fill="#FB923C" fill-opacity="0.08"/>
