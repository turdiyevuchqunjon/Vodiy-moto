  <rect x="870" y="310" width="90" height="80" rx="10" fill="#0F172A" stroke="#FB923C" stroke-width="8"/>
  <line x1="720" y1="320" x2="840" y2="320" stroke="#F97316" stroke-width="4" opacity="0.5"/>
  <line x1="720" y1="350" x2="840" y2="350" stroke="#F97316" stroke-width="4" opacity="0.3"/>
  <!-- Front wheel -->
  <circle cx="330" cy="510" r="85" stroke="#F1F5F9" stroke-width="18"/>
