<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="800" rx="32" fill="#0C0718"/>
  <circle cx="220" cy="170" r="150" fill="#8B5CF6" fill-opacity="0.14"/>
  <circle cx="1000" cy="160" r="180" fill="#A78BFA" fill-opacity="0.08"/>
  <!-- Car body -->
  <path d="M220 510H330L380 370H520L560 310H800L850 370H920L960 510H1040" stroke="#DDD6FE" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Roof -->
  <path d="M520 310H800" stroke="#A78BFA" stroke-width="12" stroke-linecap="round"/>
  <!-- Windshield -->
  <path d="M520 310L580 370" stroke="#C4B5FD" stroke-width="8" stroke-linecap="round"/>
  <path d="M800 310L850 370" stroke="#C4B5FD" stroke-width="8" stroke-linecap="round"/>
  <!-- Windows -->
  <rect x="590" y="318" width="95" height="48" rx="8" fill="#1E1B4B" stroke="#8B5CF6" stroke-width="5" opacity="0.7"/>
  <rect x="700" y="318" width="90" height="48" rx="8" fill="#1E1B4B" stroke="#8B5CF6" stroke-width="5" opacity="0.7"/>
  <!-- Door line -->
  <line x1="690" y1="318" x2="690" y2="500" stroke="#A78BFA" stroke-width="3" opacity="0.4"/>
  <!-- Front wheel -->
  <circle cx="370" cy="510" r="72" stroke="#F1F5F9" stroke-width="16"/>
  <circle cx="370" cy="510" r="24" fill="#8B5CF6" fill-opacity="0.3"/>
  <!-- Rear wheel -->
  <circle cx="910" cy="510" r="72" stroke="#F1F5F9" stroke-width="16"/>
  <circle cx="910" cy="510" r="24" fill="#8B5CF6" fill-opacity="0.3"/>
  <!-- Headlight -->
  <circle cx="280" cy="460" r="16" fill="#8B5CF6" fill-opacity="0.6"/>
  <circle cx="280" cy="460" r="8" fill="#DDD6FE"/>
  <!-- Taillight -->
  <circle cx="990" cy="460" r="14" fill="#EF4444" fill-opacity="0.6"/>
  <!-- Text -->
  <text x="80" y="120" fill="#F1F5F9" font-family="Arial,sans-serif" font-size="54" font-weight="700">MINI CAR SERIES</text>
  <text x="80" y="168" fill="#94A3B8" font-family="Arial,sans-serif" font-size="24">VodiyMoto ixcham mini mashina</text>
</svg>
